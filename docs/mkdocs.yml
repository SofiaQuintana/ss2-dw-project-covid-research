site_name: Proyecto | Fase 1 — Seminario de Sistemas 2 - Vac Junio 2026
site_description: Documentación técnica del proyecto End-to-End de análisis de mortalidad Pre/Post-COVID en Guatemala y Centroamérica.
site_author: Grupo 10 - Seminario de Sistemas 2 - Vac Junio 2026

# GitHub repo (aparece como botón en la esquina superior derecha del sitio)
repo_name: ss2-dw-project-covid-research          # <-- reemplazar con usuario/repo real
repo_url: https://github.com/SofiaQuintana/ss2-dw-project-covid-research  # <-- reemplazar

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      primary: deep orange
      accent: purple
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
    
  language: es
  features:
    - navigation.tabs         # pestañas superiores por fase
    - navigation.sections     # secciones colapsables en sidebar
    - navigation.top          # botón "volver arriba"
    - search.highlight
    - content.code.copy       # botón de copiar en bloques de código

plugins:
  - search

markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - admonition              
  - pymdownx.details        
  - pymdownx.superfences    
  - pymdownx.tabbed:
      alternate_style: true 
  - tables
  - toc:
      permalink: true       

# ── Estructura de navegación ──────────────────────────────────────────────────
nav:
  - Inicio: index.md

  - Fase 1 — Ingesta:
    - Resumen: fase1/index.md
    - Catálogo de Fuentes: fase1/catalogo_fuentes.md
    - Diccionario de Datos: fase1/diccionario_datos.md
    - Pipelines de Ingesta:
      - OMS (Google Drive): fase1/pipeline_oms_gdrive.md
      - Archivos Locales (DBFS): fase1/pipeline_local_dbfs.md
    - Plan de Anonimización: fase1/anonimizacion.md
    - Linaje de Datos: fase1/lineage.md

  - Fase 2 — Transformación:
    - Resumen: fase2/index.md

  - Fase 3 — ML y BI:
    - Resumen: fase3/index.md
