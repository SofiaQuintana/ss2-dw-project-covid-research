site_name: Proyecto | Fase 1 — Seminario de Sistemas 2 - Vac Junio 2026
site_description: Documentación técnica del proyecto End-to-End de análisis de mortalidad Pre/Post-COVID en Guatemala y Centroamérica.
site_author: Grupo 10 - Seminario de Sistemas 2 - Vac Junio 2026

# GitHub repo
repo_name: ss2-dw-project-covid-research
repo_url: https://github.com/SofiaQuintana/ss2-dw-project-covid-research

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      primary: deep orange
      accent: purple
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
    
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true       

# ── Estructura de navegación ──────────────────────────────────────────────────
nav:
  - Inicio: index.md

  - Fase 1 — Ingesta:
    - Resumen: fase1/index.md
    - Catálogo de Fuentes: fase1/catalogo_fuentes.md
    - Diccionario de Datos: fase1/diccionario_datos.md
    - Pipelines de Ingesta:
      - Creación de Esquema: fase1/pipeline_schema_creation.md
      - OMS (Google Drive): fase1/pipeline_oms_gdrive.md
      - MSPAS (Dropbox): fase1/pipeline_dropbox_mspas.md
      - INE (S3): fase1/pipeline_s3_ine.md
      - Archivos Locales (DBFS): fase1/pipeline_local_dbfs.md
    - Plan de Anonimización: fase1/anonimizacion.md
    - Linaje de Datos: fase1/lineage.md

  - Fase 2 — Transformación:
    - Resumen: fase2/index.md
    - Arquitectura: fase2/arquitectura.md
    - Reglas de Transformación: fase2/reglas_transformacion.md
    - Source-to-Target Mapping: fase2/source_to_target_mapping.md
    - DW Local (Backup y Evidencia): fase2/dw_local_evidencia_y_backup.md

  - Fase 3 — ML y BI:
    - Resumen: fase3/index.md
    - Arquitectura: fase3/arquitectura.md
    - Documentación Fase 3 (Drive): https://drive.google.com/drive/u/3/folders/1DzDgBGiFRfbDw8EdrTQp932aCmgi2tBd
